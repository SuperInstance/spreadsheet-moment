name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: ./website
        run: pnpm install --frozen-lockfile

      - name: Build website
        working-directory: ./website
        run: pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          cname: spreadsheetmoment.com

  publish-packages:
    name: Publish Packages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check version changes
        id: versions
        run: |
          git fetch origin main:main
          echo "packages=$(git diff origin/main...HEAD --name-only | grep "package.json" | wc -l)" >> $GITHUB_OUTPUT

      - name: Publish to npm
        if: steps.versions.outputs.packages > 0
        run: |
          for package in packages/*/; do
            if [ -f "$package/package.json" ]; then
              echo "Publishing $package"
              cd "$package"
              pnpm publish --access public --no-git-checks
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.versions.outputs.packages > 0
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes in this release
            ${{ github.event.head_commit.message }}

            ## Published packages
            - @spreadsheet-moment/agent-core
            - @spreadsheet-moment/agent-ui
            - @spreadsheet-moment/agent-ai
            - @spreadsheet-moment/agent-formulas
          draft: false
          prerelease: false

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-github-pages, publish-packages]
    if: always()
    steps:
      - name: Send success notification
        if: needs.deploy-cloudflare.result == 'success' && needs.deploy-github-pages.result == 'success'
        run: |
          echo "Deployment successful!"
          echo "Cloudflare Workers: https://workers.cloudflare.com"
          echo "GitHub Pages: https://spreadsheetmoment.com"
          echo "npm packages: https://www.npmjs.com/org/spreadsheet-moment"

      - name: Send failure notification
        if: needs.deploy-cloudflare.result == 'failure' || needs.deploy-github-pages.result == 'failure'
        run: |
          echo "::error::Deployment failed!"
          echo "Please check the logs for details"
          exit 1
