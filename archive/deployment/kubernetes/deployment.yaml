# Spreadsheet Moment - Kubernetes Deployment Manifests
# Staging environment deployment configuration

apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    name: staging
    environment: staging
    project: spreadsheet-moment

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: spreadsheet-moment-config
  namespace: staging
data:
  ENVIRONMENT: "staging"
  NODE_ENV: "staging"
  PORT: "3000"
  HEALTH_CHECK_PORT: "3001"
  LOG_LEVEL: "debug"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: spreadsheet-moment-secret
  namespace: staging
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@spreadsheet-moment-postgres-staging:5432/spreadsheet_moment_staging"
  REDIS_URL: "redis://spreadsheet-moment-redis-staging:6379"
  CLAW_API_URL: "https://staging-api.claw.superinstance.ai"
  CLAW_API_WS_URL: "wss://staging-api.claw.superinstance.ai/ws"
  JWT_SECRET: "your-jwt-secret-staging-min-32-chars-change-this"
  SESSION_SECRET: "your-session-secret-staging-min-32-chars-change-this"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spreadsheet-moment
  namespace: staging
  labels:
    app: spreadsheet-moment
    environment: staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spreadsheet-moment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: spreadsheet-moment
        environment: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: spreadsheet-moment
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: spreadsheet-moment
        image: spreadsheet-moment:staging
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: health
          containerPort: 3001
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: ENVIRONMENT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: PORT
        - name: HEALTH_CHECK_PORT
          valueFrom:
            configMapKeyRef:
              name: spreadsheet-moment-config
              key: HEALTH_CHECK_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secret
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secret
              key: REDIS_URL
        - name: CLAW_API_URL
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secret
              key: CLAW_API_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: spreadsheet-moment-secret
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: health
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: logs
          mountPath: /var/log/spreadsheet-moment
      volumes:
      - name: logs
        emptyDir: {}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: spreadsheet-moment
  namespace: staging
  labels:
    app: spreadsheet-moment
    environment: staging
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  - name: health
    port: 3001
    targetPort: health
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: spreadsheet-moment

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spreadsheet-moment-hpa
  namespace: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spreadsheet-moment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: spreadsheet-moment-pdb
  namespace: staging
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: spreadsheet-moment

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spreadsheet-moment
  namespace: staging
  labels:
    app: spreadsheet-moment
    environment: staging

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spreadsheet-moment-ingress
  namespace: staging
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
  - hosts:
    - staging.spreadsheet-moment.superinstance.ai
    secretName: spreadsheet-moment-tls
  rules:
  - host: staging.spreadsheet-moment.superinstance.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spreadsheet-moment
            port:
              number: 3000

---
# Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: spreadsheet-moment-tls
  namespace: staging
spec:
  secretName: spreadsheet-moment-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - staging.spreadsheet-moment.superinstance.ai
