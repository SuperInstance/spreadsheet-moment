# Spreadsheet Moment - Promtail Configuration
# Log collection agent for staging environment

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Application logs
  - job_name: spreadsheet-moment-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: spreadsheet-moment
          environment: staging
          __path__: /var/log/spreadsheet-moment/*.log

  # Nginx logs
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          environment: staging
          __path__: /var/log/nginx/*.log

  # Docker logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_spreadsheetmoment_service']
        target_label: 'service'

# Pipeline stages for log parsing
pipeline_stages:
  # Parse JSON logs
  - json:
      expressions:
        timestamp: timestamp
        level: level
        message: message
        request_id: request_id
        user_id: user_id

  # Parse timestamps
  - timestamp:
      source: timestamp
      format: RFC3339

  # Parse log levels
  - labels:
      level:
      request_id:
      user_id:
