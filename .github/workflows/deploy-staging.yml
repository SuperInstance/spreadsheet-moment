# Spreadsheet Moment - Staging Deployment Pipeline
# Automated CI/CD for staging environment
#
# Triggers:
#   - Push to develop branch
#   - Manual workflow dispatch
#   - Scheduled nightly builds

name: Deploy to Staging

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - staging-rollback
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        type: boolean
        default: false
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # JOB 1: Run Tests
  # ============================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test --coverage

      - name: Run integration tests
        run: pnpm test:integration

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-staging

      - name: Test summary
        uses: test-summary/action@v2
        if: always()
        with:
          summary: true
          display_strategy: immediate

  # ============================================================================
  # JOB 2: Security Scanning
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # JOB 3: Build Application
  # ============================================================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build Docker image
        run: |
          docker build \
            -f deployment/staging/Dockerfile \
            -t spreadsheet-moment:staging \
            -t spreadsheet-moment:${{ github.sha }} \
            .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag spreadsheet-moment:staging ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          docker tag spreadsheet-moment:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: packages/*/dist
          retention-days: 7

  # ============================================================================
  # JOB 4: Deploy to Staging
  # ============================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.spreadsheet-moment.superinstance.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name spreadsheet-moment-staging \
            --region us-east-1

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/spreadsheet-moment \
            spreadsheet-moment=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/spreadsheet-moment -n staging --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n staging -l app=spreadsheet-moment

      - name: Run smoke tests
        run: |
          curl -f https://staging.spreadsheet-moment.superinstance.ai/health || exit 1
          curl -f https://staging-api.spreadsheet-moment.superinstance.ai/health || exit 1

      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ github.sha }}',
              task: 'deploy',
              auto_merge: false,
              required_contexts: [],
              environment: 'staging',
              description: 'Deploy to staging environment',
              payload: {
                version: '${{ github.sha }}'
              }
            })

      - name: Update deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: 'success',
              environment_url: 'https://staging.spreadsheet-moment.superinstance.ai',
              environment: 'staging',
              log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

  # ============================================================================
  # JOB 5: Integration Tests (Post-Deployment)
  # ============================================================================
  integration-test:
    name: Post-Deployment Integration Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          BASE_URL: https://staging.spreadsheet-moment.superinstance.ai
          API_URL: https://staging-api.spreadsheet-moment.superinstance.ai

      - name: Run load tests
        run: pnpm test:load
        env:
          BASE_URL: https://staging.spreadsheet-moment.superinstance.ai

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Staging deployment successful!\n\n🔗 [View Staging](https://staging.spreadsheet-moment.superinstance.ai)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })

  # ============================================================================
  # JOB 6: Rollback (Manual)
  # ============================================================================
  rollback:
    name: Rollback Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging-rollback'
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name spreadsheet-moment-staging \
            --region us-east-1

      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/spreadsheet-moment -n staging

      - name: Wait for rollback
        run: |
          kubectl rollout status deployment/spreadsheet-moment -n staging --timeout=5m

      - name: Verify rollback
        run: |
          curl -f https://staging.spreadsheet-moment.superinstance.ai/health || exit 1

  # ============================================================================
  # JOB 7: Notifications
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, integration-test]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Spreadsheet Moment Staging Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment ${{ job.status }}*\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n*Environment:* Staging\n\n🔗 [View Staging](https://staging.spreadsheet-moment.superinstance.ai)\n🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Staging Deployment Failed - ${{ github.repository }}"
          to: devops@superinstance.ai
          from: github-actions@superinstance.ai
          body: |
            Staging deployment failed for ${{ github.repository }}

            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}

            Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
